<body>
<canvas id="simCanvas"></canvas>
<div id="screenOverlay"></div>
<canvas id="statCanvas"></canvas>

<div id="sceneTitle">
    <div class="cn">物理实验竞赛命题5｜熵增原理</div>
    <div class="en">Entropy Increase Principle · Particle Frequency Simulation</div>
</div>

<div id="teamBadge">
    <div class="badgeKicker">Team</div>
    <div class="badgeTeam">我是奶龙对不队</div>

    <div class="badgeLine"></div>
</div>

<div id="topInfo">
    <div class="miniTitle">Live Statistics</div>
    <div id="liveText">Initializing...</div>
</div>

<div id="controlPanel">
    <div class="panelTitle">
        <div><span class="statusDot"></span>熵增粒子系统参数</div>
        <div id="fpsText">FPS --</div>
    </div>

    <div class="grid">
        <div class="item">
            <label>粒子数 N</label>
            <input id="NInput" type="number" value="800" min="50" max="3000" step="50">
        </div>

        <div class="item">
            <label>速度 speed</label>
            <input id="speedInput" type="number" value="20" min="1" max="100" step="1">
        </div>

        <div class="item">
            <label>时间步长 dt</label>
            <input id="dtInput" type="number" value="0.08" min="0.005" max="0.5" step="0.005">
        </div>

        <div class="item">
            <label>箱体半长 L</label>
            <input id="cubeInput" type="number" value="10" min="4" max="30" step="1">
        </div>

        <div class="item">
            <label>统计长度</label>
            <input id="historyInput" type="number" value="3000" min="200" max="20000" step="100">
        </div>
    </div>

    <div class="buttons">
        <button id="startBtn">开始 / 暂停</button>
        <button id="resetBtn" class="ghost">重置</button>
        <button id="fullBtn" class="ghost">全屏</button>
    </div>

    <div id="hint">
        黑箱内粒子由初始偏置逐渐扩散，右上角频次分布用于展示宏观统计趋于稳定的过程。手机端建议 N = 300–1200，展示时可点击全屏。
    </div>
</div>

<script>
"use strict";

/* =========================================================
   1. 基础对象
========================================================= */

const simCanvas = document.getElementById("simCanvas");
const simCtx = simCanvas.getContext("2d");

const statCanvas = document.getElementById("statCanvas");
const statCtx = statCanvas.getContext("2d");

const liveText = document.getElementById("liveText");
const fpsText = document.getElementById("fpsText");

const NInput = document.getElementById("NInput");
const speedInput = document.getElementById("speedInput");
const dtInput = document.getElementById("dtInput");
const cubeInput = document.getElementById("cubeInput");
const historyInput = document.getElementById("historyInput");

const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");
const fullBtn = document.getElementById("fullBtn");

let W = 0;
let Hh = 0;
let dpr = Math.min(window.devicePixelRatio || 1, 2);

let running = true;

let N = 800;
let speed = 20;
let dt = 0.08;
let cubeSize = 10;
let maxHistory = 3000;

let pos = null;
let vel = null;
let history = [];
let currentLeft = 0;
let stepCount = 0;

let lastTime = performance.now();
let fpsSmooth = 60;

/* =========================================================
   2. 画布适配
========================================================= */

function resizeCanvas() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    W = window.innerWidth;
    Hh = window.innerHeight;

    simCanvas.width = Math.floor(W * dpr);
    simCanvas.height = Math.floor(Hh * dpr);
    simCanvas.style.width = W + "px";
    simCanvas.style.height = Hh + "px";
    simCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const rect = statCanvas.getBoundingClientRect();
    statCanvas.width = Math.floor(rect.width * dpr);
    statCanvas.height = Math.floor(rect.height * dpr);
    statCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener("resize", resizeCanvas);

/* =========================================================
   3. 工具函数
========================================================= */

function randn() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function clamp(v, a, b) {
    return Math.max(a, Math.min(b, v));
}

function readParams() {
    N = clamp(parseInt(NInput.value || "800", 10), 50, 3000);
    speed = clamp(parseFloat(speedInput.value || "20"), 1, 100);
    dt = clamp(parseFloat(dtInput.value || "0.08"), 0.005, 0.5);
    cubeSize = clamp(parseFloat(cubeInput.value || "10"), 4, 30);
    maxHistory = clamp(parseInt(historyInput.value || "3000", 10), 200, 20000);

    NInput.value = N;
    speedInput.value = speed;
    dtInput.value = dt;
    cubeInput.value = cubeSize;
    historyInput.value = maxHistory;
}

/* =========================================================
   4. 初始化物理系统
========================================================= */

function initSimulation() {
    readParams();

    pos = new Float32Array(N * 3);
    vel = new Float32Array(N * 3);

    const L = cubeSize;
    const yz = cubeSize / 2;

    for (let i = 0; i < N; i++) {
        const k = i * 3;

        // 初始位置：全部偏向左箱
        pos[k]     = -L * Math.random();
        pos[k + 1] = yz * (2 * Math.random() - 1);
        pos[k + 2] = yz * (2 * Math.random() - 1);

        let vx = randn();
        let vy = randn();
        let vz = randn();
        const norm = Math.sqrt(vx * vx + vy * vy + vz * vz) || 1;

        vel[k]     = vx / norm * speed;
        vel[k + 1] = vy / norm * speed;
        vel[k + 2] = vz / norm * speed;
    }

    history = [];
    currentLeft = N;
    stepCount = 0;
}

/* =========================================================
   5. 物理更新
========================================================= */

function updatePhysics() {
    const L = cubeSize;
    const yz = cubeSize / 2;

    let nLeft = 0;

    for (let i = 0; i < N; i++) {
        const k = i * 3;

        pos[k]     += vel[k]     * dt;
        pos[k + 1] += vel[k + 1] * dt;
        pos[k + 2] += vel[k + 2] * dt;

        if (pos[k] > L) {
            pos[k] = L - (pos[k] - L);
            vel[k] = -vel[k];
        }
        if (pos[k] < -L) {
            pos[k] = -L - (pos[k] + L);
            vel[k] = -vel[k];
        }

        if (pos[k + 1] > yz) {
            pos[k + 1] = yz - (pos[k + 1] - yz);
            vel[k + 1] = -vel[k + 1];
        }
        if (pos[k + 1] < -yz) {
            pos[k + 1] = -yz - (pos[k + 1] + yz);
            vel[k + 1] = -vel[k + 1];
        }

        if (pos[k + 2] > yz) {
            pos[k + 2] = yz - (pos[k + 2] - yz);
            vel[k + 2] = -vel[k + 2];
        }
        if (pos[k + 2] < -yz) {
            pos[k + 2] = -yz - (pos[k + 2] + yz);
            vel[k + 2] = -vel[k + 2];
        }

        if (pos[k] < 0) nLeft++;
    }

    currentLeft = nLeft;
    history.push(nLeft);

    if (history.length > maxHistory) {
        history.splice(0, history.length - maxHistory);
    }

    stepCount++;
}

/* =========================================================
   6. 3D 投影与绘图
========================================================= */

function project3D(x, y, z) {
    // 为了手机端轻量，不引入 three.js，这里用手写透视投影
    const yaw = 0.38;
    const pitch = 0.25;

    const cy = Math.cos(yaw);
    const sy = Math.sin(yaw);
    const cp = Math.cos(pitch);
    const sp = Math.sin(pitch);

    // yaw: 绕 z 轴
    let x1 = x * cy - y * sy;
    let y1 = x * sy + y * cy;
    let z1 = z;

    // pitch: 让箱体有轻微俯视感
    let y2 = y1 * cp - z1 * sp;
    let z2 = y1 * sp + z1 * cp;

    const isMobileView = W <= 720;
    const baseScale = Math.min(W, Hh) / (cubeSize * (isMobileView ? 3.05 : 3.2));
    const focal = 50;
    const perspective = focal / (focal + y2);

    // 手机竖屏时，把箱体放在信息区和底部控制区之间，避免被遮挡
    const centerY = isMobileView ? Hh * 0.47 : Hh * 0.49;
    const sx = W * 0.50 + x1 * baseScale * perspective;
    const sy2 = centerY - z2 * baseScale * perspective;

    return {
        x: sx,
        y: sy2,
        depth: y2,
        scale: perspective
    };
}

function drawLine3D(a, b, color, width, alpha) {
    const pa = project3D(a[0], a[1], a[2]);
    const pb = project3D(b[0], b[1], b[2]);

    simCtx.save();
    simCtx.globalAlpha = alpha;
    simCtx.strokeStyle = color;
    simCtx.lineWidth = width;
    simCtx.beginPath();
    simCtx.moveTo(pa.x, pa.y);
    simCtx.lineTo(pb.x, pb.y);
    simCtx.stroke();
    simCtx.restore();
}

function drawPoly3D(points, fill, stroke, alphaFill, alphaStroke) {
    if (points.length < 3) return;

    simCtx.save();

    const p0 = project3D(points[0][0], points[0][1], points[0][2]);
    simCtx.beginPath();
    simCtx.moveTo(p0.x, p0.y);

    for (let i = 1; i < points.length; i++) {
        const p = project3D(points[i][0], points[i][1], points[i][2]);
        simCtx.lineTo(p.x, p.y);
    }

    simCtx.closePath();

    if (fill) {
        simCtx.globalAlpha = alphaFill;
        simCtx.fillStyle = fill;
        simCtx.fill();
    }

    if (stroke) {
        simCtx.globalAlpha = alphaStroke;
        simCtx.strokeStyle = stroke;
        simCtx.lineWidth = 1;
        simCtx.stroke();
    }

    simCtx.restore();
}

function drawBackgroundGlow() {
    // 纯黑背景：手机展示时更干净，也更像正式比赛演示界面
    simCtx.fillStyle = "#000";
    simCtx.fillRect(0, 0, W, Hh);
}

function drawBox() {
    const L = cubeSize;
    const h = cubeSize / 2;

    const v = [
        [-L, -h, -h], [ L, -h, -h], [ L,  h, -h], [-L,  h, -h],
        [-L, -h,  h], [ L, -h,  h], [ L,  h,  h], [-L,  h,  h]
    ];

    // 暗色箱体面
    drawPoly3D([v[0], v[1], v[2], v[3]], "rgba(40,40,42,1)", null, 0.55, 0);
    drawPoly3D([v[0], v[4], v[5], v[1]], "rgba(32,32,34,1)", null, 0.50, 0);
    drawPoly3D([v[3], v[2], v[6], v[7]], "rgba(35,35,38,1)", null, 0.46, 0);

    // 顶部玻璃感
    drawPoly3D([v[4], v[5], v[6], v[7]], "rgba(160,190,220,1)", "rgba(150,200,255,1)", 0.045, 0.22);

    // 边框
    const edges = [
        [0,1], [1,2], [2,3], [3,0],
        [4,5], [5,6], [6,7], [7,4],
        [0,4], [1,5], [2,6], [3,7]
    ];

    for (const e of edges) {
        drawLine3D(v[e[0]], v[e[1]], "rgba(150,170,190,0.65)", 1.0, 0.45);
    }

    // 中间分隔面 x = 0
    const d0 = [0, -h, -h];
    const d1 = [0,  h, -h];
    const d2 = [0,  h,  h];
    const d3 = [0, -h,  h];

    drawPoly3D([d0, d1, d2, d3], "rgba(0,210,255,1)", "rgba(0,220,255,1)", 0.035, 0.70);
    drawLine3D(d0, d1, "rgba(0,220,255,1)", 2.0, 0.85);
    drawLine3D(d1, d2, "rgba(0,220,255,1)", 2.0, 0.85);
    drawLine3D(d2, d3, "rgba(0,220,255,1)", 2.0, 0.85);
    drawLine3D(d3, d0, "rgba(0,220,255,1)", 2.0, 0.85);
}

function drawParticles() {
    // 左侧偏暖、右侧偏冷，模拟从有序偏置走向混合均匀的视觉过程
    for (let i = 0; i < N; i++) {
        const k = i * 3;
        const p = project3D(pos[k], pos[k + 1], pos[k + 2]);
        const isLeft = pos[k] < 0;

        const rHalo = 4.6 * p.scale;
        const rCore = 1.65 * p.scale;

        simCtx.beginPath();
        simCtx.globalAlpha = 0.115;
        simCtx.fillStyle = isLeft ? "rgb(255, 160, 70)" : "rgb(75, 205, 255)";
        simCtx.arc(p.x, p.y, rHalo, 0, Math.PI * 2);
        simCtx.fill();

        simCtx.beginPath();
        simCtx.globalAlpha = 0.82;
        simCtx.fillStyle = isLeft ? "rgb(255, 216, 165)" : "rgb(188, 238, 255)";
        simCtx.arc(p.x, p.y, rCore, 0, Math.PI * 2);
        simCtx.fill();
    }

    simCtx.globalAlpha = 1;
}

function drawScene() {
    drawBackgroundGlow();
    drawBox();
    drawParticles();
}

/* =========================================================
   7. 统计图绘制
========================================================= */

function mean(arr) {
    if (arr.length === 0) return 0;
    let s = 0;
    for (const v of arr) s += v;
    return s / arr.length;
}

function std(arr, mu) {
    if (arr.length <= 1) return 0;
    let s = 0;
    for (const v of arr) {
        const d = v - mu;
        s += d * d;
    }
    return Math.sqrt(s / (arr.length - 1));
}

function drawRoundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawStats() {
    const rect = statCanvas.getBoundingClientRect();
    const sw = rect.width;
    const sh = rect.height;

    statCtx.clearRect(0, 0, sw, sh);

    // 背景
    statCtx.save();
    drawRoundRect(statCtx, 0, 0, sw, sh, 16);
    statCtx.fillStyle = "rgba(4, 7, 12, 0.62)";
    statCtx.fill();
    statCtx.restore();

    const padL = 38;
    const padR = 14;
    const padT = 30;
    const padB = 28;

    const x0 = padL;
    const y0 = sh - padB;
    const plotW = sw - padL - padR;
    const plotH = sh - padT - padB;

    // 标题
    statCtx.fillStyle = "rgba(225,225,225,0.82)";
    statCtx.font = "12px Arial";
    statCtx.fillText("Entropy Frequency Distribution", padL, 18);

    // 坐标轴
    statCtx.strokeStyle = "rgba(200,220,235,0.25)";
    statCtx.lineWidth = 1;
    statCtx.beginPath();
    statCtx.moveTo(x0, padT);
    statCtx.lineTo(x0, y0);
    statCtx.lineTo(sw - padR, y0);
    statCtx.stroke();

    if (history.length < 3) return;

    const mu = mean(history);
    const sig = std(history, mu);
    const sampleCount = history.length;

    const bins = Math.min(150, Math.max(30, Math.floor(N / 8)));
    const binWidth = N / bins;
    const counts = new Array(bins).fill(0);

    for (const v of history) {
        let id = Math.floor(v / binWidth);
        if (id < 0) id = 0;
        if (id >= bins) id = bins - 1;
        counts[id]++;
    }

    let maxY = 1;
    for (const c of counts) {
        if (c > maxY) maxY = c;
    }

    // 加入拟合线最大值估计
    if (sig > 0.01) {
        const peak = (1 / (sig * Math.sqrt(2 * Math.PI))) * sampleCount * binWidth;
        maxY = Math.max(maxY, peak);
    }

    maxY *= 1.22;

    // 柱状图
    for (let i = 0; i < bins; i++) {
        const c = counts[i];
        const bx = x0 + (i / bins) * plotW;
        const bw = Math.max(1, plotW / bins - 1);
        const bh = c / maxY * plotH;
        const by = y0 - bh;

        statCtx.fillStyle = "rgba(106, 174, 220, 0.62)";
        statCtx.fillRect(bx, by, bw, bh);
    }

    // 高斯拟合线
    if (sig > 0.01) {
        statCtx.strokeStyle = "rgba(255, 220, 165, 0.95)";
        statCtx.lineWidth = 2;
        statCtx.beginPath();

        for (let i = 0; i <= 260; i++) {
            const xVal = N * i / 260;
            const pdf = (1 / (sig * Math.sqrt(2 * Math.PI))) *
                Math.exp(-0.5 * Math.pow((xVal - mu) / sig, 2));
            const yVal = pdf * sampleCount * binWidth;

            const px = x0 + xVal / N * plotW;
            const py = y0 - yVal / maxY * plotH;

            if (i === 0) statCtx.moveTo(px, py);
            else statCtx.lineTo(px, py);
        }

        statCtx.stroke();
    }

    // 坐标刻度
    statCtx.fillStyle = "rgba(220,220,220,0.62)";
    statCtx.font = "10px Arial";
    statCtx.textAlign = "center";
    statCtx.fillText("0", x0, sh - 9);
    statCtx.fillText(String(Math.round(N / 2)), x0 + plotW / 2, sh - 9);
    statCtx.fillText(String(N), x0 + plotW, sh - 9);

    statCtx.textAlign = "right";
    statCtx.fillText(String(Math.round(maxY)), x0 - 5, padT + 4);
    statCtx.fillText("0", x0 - 5, y0 + 3);

    // 当前信息
    statCtx.textAlign = "left";
    statCtx.fillStyle = "rgba(220,220,220,0.78)";
    statCtx.font = "11px Arial";
    statCtx.fillText("Cur: " + currentLeft, x0 + plotW * 0.58, padT + 16);
    statCtx.fillText("μ: " + mu.toFixed(1), x0 + plotW * 0.58, padT + 31);
    statCtx.fillText("σ: " + sig.toFixed(1), x0 + plotW * 0.58, padT + 46);
}

/* =========================================================
   8. 主循环
========================================================= */

function loop(now) {
    const delta = now - lastTime;
    lastTime = now;

    const fps = 1000 / Math.max(delta, 1);
    fpsSmooth = fpsSmooth * 0.92 + fps * 0.08;

    if (running) {
        // 每帧多走几步，让混合过程更明显
        const subSteps = W < 720 ? 2 : 3;
        for (let i = 0; i < subSteps; i++) {
            updatePhysics();
        }
    }

    drawScene();
    drawStats();

    if (stepCount % 5 === 0) {
        const mu = history.length ? mean(history) : 0;
        const sig = history.length > 2 ? std(history, mu) : 0;

        liveText.innerHTML =
            "Left Count: " + currentLeft + " / " + N +
            "<br>Mean μ: " + mu.toFixed(1) +
            " &nbsp; Std σ: " + sig.toFixed(1);

        fpsText.textContent = "FPS " + fpsSmooth.toFixed(0);
    }

    requestAnimationFrame(loop);
}

/* =========================================================
   9. 交互按钮
========================================================= */

startBtn.addEventListener("click", function() {
    running = !running;
});

resetBtn.addEventListener("click", function() {
    initSimulation();
});

fullBtn.addEventListener("click", function() {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
        if (el.requestFullscreen) el.requestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
});

[NInput, speedInput, dtInput, cubeInput, historyInput].forEach(function(input) {
    input.addEventListener("change", function() {
        initSimulation();
    });
});

/* =========================================================
   10. 启动
========================================================= */

resizeCanvas();
initSimulation();
requestAnimationFrame(loop);
</script>

</body>
